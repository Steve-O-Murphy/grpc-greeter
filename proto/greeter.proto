// greeter.proto
syntax = "proto3";

package greeter;

// The service definition
service Greeter {
  rpc SayHello (HelloRequest) returns (HelloReply);
}

// The request message
message HelloRequest {
  string name = 1;
  uint32 age = 2;
  string pswd = 3;
}

// The response message
message HelloReply {
  string message = 1;
}